<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>
      {% load static %}
<link  href ="{% static 'src/styles.css' %}" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-7xl mx-auto">

    <!-- Header + Add Button -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-4 sm:mb-0">
        Product List
      </h1>

      <a href="{% url "add_product" %}"
        class="inline-block px-5 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition">
        + Add Product
      </a>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto bg-white shadow-md rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-200">
          {% for d in data %}
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm">{{d.id}}</td>
            <td class="px-6 py-4 text-sm">{{d.title}}</td>
            <td class="px-6 py-4 text-sm">{{d.category}}</td>
            <td class="px-6 py-4 text-sm">{{d.price}}</td>
            <td class="px-6 py-4 text-sm text-gray-500">{{d.description}}</td>
            <td class="px-6 py-4 text-center text-sm">
              <button class="text-blue-600 hover:text-blue-900 mr-3">Edit</button>
              <button class="text-red-600 hover:text-red-900">Delete</button>
            </td>
          </tr> 
          {% endfor %}

        </tbody>
      </table>
    </div>

  </div>

</body>
</html>
